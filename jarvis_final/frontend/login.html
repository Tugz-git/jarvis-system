<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S. — Authorization</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #020608;
    color: #c8e8f0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.012) 2px, rgba(0,229,255,0.012) 4px);
    z-index: 100;
  }
  canvas { position: fixed; inset: 0; z-index: 0; }
  .login-box {
    position: relative;
    z-index: 10;
    background: rgba(2,10,22,0.95);
    border: 1px solid rgba(0,229,255,0.4);
    border-radius: 8px;
    padding: 40px;
    width: 340px;
    box-shadow: 0 0 60px rgba(0,229,255,0.1);
    text-align: center;
  }
  .login-logo { font-size: 13px; letter-spacing: 4px; color: #00e5ff; margin-bottom: 6px; }
  .login-sub { font-size: 9px; letter-spacing: 2px; color: rgba(200,232,240,0.4); margin-bottom: 32px; }
  .login-label { font-size: 10px; letter-spacing: 2px; color: rgba(200,232,240,0.5); text-align: left; margin-bottom: 6px; }
  .login-input {
    width: 100%;
    background: rgba(0,20,40,0.7);
    border: 1px solid rgba(0,229,255,0.25);
    border-radius: 3px;
    padding: 10px 14px;
    color: #c8e8f0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: #00e5ff; box-shadow: 0 0 8px rgba(0,229,255,0.2); }
  .login-btn {
    width: 100%;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.5);
    border-radius: 3px;
    color: #00e5ff;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .login-btn:hover { background: rgba(0,229,255,0.2); box-shadow: 0 0 16px rgba(0,229,255,0.3); }
  .login-error { color: #ff2244; font-size: 11px; letter-spacing: 1px; margin-top: 12px; min-height: 16px; }
  .login-status { font-size: 10px; color: rgba(200,232,240,0.3); margin-top: 20px; letter-spacing: 1px; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="login-box">
  <div class="login-logo">⬡ J.A.R.V.I.S.</div>
  <div class="login-sub">NEURAL OPERATING SYSTEM — RESTRICTED ACCESS</div>
  <div class="login-label">USERNAME</div>
  <input type="text" id="uname" class="login-input" value="sir" autocomplete="username"/>
  <div class="login-label">PASSWORD</div>
  <input type="password" id="pass" class="login-input" placeholder="••••••••" autocomplete="current-password"/>
  <button class="login-btn" id="login-btn">AUTHENTICATE</button>
  <div class="login-error" id="err"></div>
  <div class="login-status">AWAITING AUTHORIZATION</div>
</div>

<script>
// Mini sphere background
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const pts = Array.from({length:600},()=>({
  theta: Math.random()*Math.PI*2,
  phi: Math.acos(2*Math.random()-1),
  r: Math.min(canvas.width,canvas.height)*0.22*(0.85+Math.random()*0.15),
  s: Math.random()*1.5+0.3,
  sp: (Math.random()-.5)*0.003
}));
let rot=0;
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  rot+=0.004;
  const cx=canvas.width/2,cy=canvas.height/2;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,pts[0].r*0.6);
  g.addColorStop(0,'rgba(0,229,255,0.05)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  for(const p of pts){
    p.theta+=p.sp+rot*0.008;
    const x=cx+p.r*Math.sin(p.phi)*Math.cos(p.theta);
    const y=cy+p.r*Math.cos(p.phi);
    const z=p.r*Math.sin(p.phi)*Math.sin(p.theta);
    const d=(z/p.r+1)/2;
    ctx.beginPath();ctx.arc(x,y,p.s*(0.4+d*0.8),0,Math.PI*2);
    ctx.fillStyle=`rgba(0,200,255,${d*0.4+0.1})`;ctx.fill();
  }
  requestAnimationFrame(draw);
}
draw();

// Login
async function doLogin(){
  const u=document.getElementById('uname').value;
  const p=document.getElementById('pass').value;
  const err=document.getElementById('err');
  err.textContent='';
  try{
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Access denied');
    localStorage.setItem('jarvis_token',data.token);
    window.location.href='/';
  }catch(e){
    err.textContent='⚠ '+e.message;
  }
}
document.getElementById('login-btn').onclick=doLogin;
document.getElementById('pass').onkeydown=e=>{ if(e.key==='Enter') doLogin(); };

// Redirect if already logged in
if(localStorage.getItem('jarvis_token')) window.location.href='/';
</script>
</body>
</html>
